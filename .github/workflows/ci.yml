name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 规则：main 分支必须通过 CI 才能 merge
# 本地推之前应已跑过 npm run check（typecheck + lint + build）
# CI 是兜底，不是首选验证手段

jobs:
  quality:
    name: lint + typecheck + build
    runs-on: ubuntu-latest

    env:
      # CI 只做静态检查与构建验证，不需要真实 DB/密钥
      # Prisma generate 需要 DATABASE_URL 才能解析 schema，给一个占位即可
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      DEEPSEEK_API_KEY: "ci-placeholder"
      AUTH_SECRET: "ci-placeholder"
      BLOB_READ_WRITE_TOKEN: "ci-placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
